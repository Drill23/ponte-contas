<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f4f7fb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ponte">
<title>Conectar Ponte</title>
<style>
:root{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;color:#101217;background:#edf2f8}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:22px;background:radial-gradient(circle at 15% 0%,rgba(56,143,255,.32),transparent 30%),radial-gradient(circle at 90% 8%,rgba(255,149,0,.24),transparent 28%),linear-gradient(180deg,#fbfdff,#edf2f8)}main{width:min(520px,100%);border:1px solid rgba(255,255,255,.9);border-radius:24px;padding:24px;background:rgba(255,255,255,.72);box-shadow:0 24px 70px rgba(45,59,82,.15),inset 0 1px 0 rgba(255,255,255,.9);backdrop-filter:blur(26px)}.mark{width:56px;height:56px;border-radius:18px;display:grid;place-items:center;color:white;background:linear-gradient(145deg,#35d06f,#0f7d3d);font-size:28px;font-weight:900}h1{margin:18px 0 8px;font-size:2rem;line-height:1}p{margin:0 0 18px;color:rgba(16,18,23,.62);font-weight:650}a,button{display:inline-flex;align-items:center;justify-content:center;min-height:48px;border:0;border-radius:999px;padding:0 18px;color:#fff;background:linear-gradient(145deg,#0a84ff,#005ecb);font:inherit;font-weight:860;text-decoration:none;box-shadow:0 18px 36px rgba(0,100,210,.24)}.error .mark{background:linear-gradient(145deg,#ff8a52,#b93b15)}code{display:block;margin:14px 0 0;padding:12px;border-radius:14px;background:rgba(255,255,255,.64);color:#6b7280;white-space:pre-wrap;word-break:break-word}
</style>
</head>
<body>
<main id="box">
<div class="mark" id="mark">...</div>
<h1 id="title">Conectando Ponte</h1>
<p id="msg">Estou salvando a ponte com Google Sheets neste aparelho.</p>
<a href="./" id="go">Abrir app</a>
<code id="detail" hidden></code>
</main>
<script>
const KEY='ponte-contas:v3';
function decodeConfig(){
  const raw=location.hash.startsWith('#sync=')?location.hash.slice(6):new URLSearchParams(location.search).get('sync');
  if(!raw)throw new Error('Link sem configuracao de sync.');
  const normalized=decodeURIComponent(raw).replace(/-/g,'+').replace(/_/g,'/');
  const padded=normalized+'='.repeat((4-normalized.length%4)%4);
  return JSON.parse(atob(padded));
}
function currentMonth(){const d=new Date;return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}
function readState(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch{return {}}}
try{
  const cfg=decodeConfig();
  if(!cfg.url||!cfg.token)throw new Error('Configuracao incompleta.');
  const state=readState();
  state.salary=state.salary||'';
  state.month=state.month||currentMonth();
  state.people=state.people&&state.people.length?state.people:['Eu'];
  state.billNames=state.billNames||[];
  state.bills=state.bills||[];
  state.archives=state.archives||{};
  state.sync={url:cfg.url,token:cfg.token,last:state.sync?.last||'',pending:state.sync?.pending||[]};
  state.updatedAt=new Date().toISOString();
  localStorage.setItem(KEY,JSON.stringify(state));
  history.replaceState(null,'','./setup.html');
  document.getElementById('mark').textContent='✓';
  document.getElementById('title').textContent='Ponte conectada';
  document.getElementById('msg').textContent='O backup no Google Sheets ficou salvo neste aparelho. Vou abrir o app agora.';
  setTimeout(()=>location.href='./',1200);
}catch(err){
  document.getElementById('box').classList.add('error');
  document.getElementById('mark').textContent='!';
  document.getElementById('title').textContent='Nao conectou';
  document.getElementById('msg').textContent='O link de ativacao nao trouxe uma configuracao valida.';
  const detail=document.getElementById('detail');
  detail.hidden=false;
  detail.textContent=err.message;
}
</script>
</body>
</html>
