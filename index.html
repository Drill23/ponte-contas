<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#eef2f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Ponte">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <title>Ponte Contas</title>
  <style>
    :root{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;color:#16181d;background:#eef2f7}*{box-sizing:border-box}body{margin:0;min-width:320px;min-height:100vh}.app{min-height:100vh;padding:max(18px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right)) 28px max(16px,env(safe-area-inset-left));background:radial-gradient(circle at 20% 0%,rgba(134,190,255,.38),transparent 28%),radial-gradient(circle at 88% 18%,rgba(255,181,120,.32),transparent 26%),linear-gradient(180deg,#f8fbff 0%,#eef2f7 48%,#e9edf4 100%)}.wrap{width:min(1120px,100%);margin-inline:auto}.hero{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:18px}.eyebrow,.muted,label span{color:rgba(22,24,29,.58);font-size:.78rem;font-weight:750}.eyebrow{display:block;margin-bottom:8px;letter-spacing:.12em;text-transform:uppercase}h1{max-width:13ch;margin:0;font-size:clamp(2.35rem,8vw,5.6rem);line-height:.92;letter-spacing:0}button,input{font:inherit}button{border:0;cursor:pointer}button:disabled{opacity:.38;cursor:not-allowed}input{width:100%;min-height:48px;border:1px solid rgba(95,103,119,.2);border-radius:8px;padding:0 13px;color:#16181d;background:rgba(255,255,255,.78);outline:0;transition:border-color .16s ease,box-shadow .16s ease,background .16s ease}input:focus{border-color:rgba(0,122,255,.7);background:#fff;box-shadow:0 0 0 4px rgba(0,122,255,.13)}label{display:grid;gap:8px}.hero-actions{display:flex;gap:8px;padding-bottom:6px}.icon,.inline button{display:inline-grid;place-items:center;width:42px;height:42px;border-radius:999px;color:#16181d;background:rgba(255,255,255,.72);box-shadow:inset 0 0 0 1px rgba(255,255,255,.72),0 12px 28px rgba(28,37,54,.12);backdrop-filter:blur(20px);transition:transform .16s ease,background .16s ease}.icon:hover,.inline button:hover,.primary:hover,.ghost:hover,.suggestions button:hover,.chip:hover{transform:translateY(-1px)}.summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:12px}.card,.balance,.panel,.bill,.toast{border:1px solid rgba(255,255,255,.78);border-radius:8px;background:rgba(255,255,255,.62);box-shadow:0 18px 50px rgba(46,56,77,.12),inset 0 1px 0 rgba(255,255,255,.72);backdrop-filter:blur(24px) saturate(1.2)}.card{position:relative;min-height:116px;padding:16px;overflow:hidden}.card strong{display:block;margin-top:18px;font-size:clamp(1.18rem,2.5vw,1.85rem);line-height:1}.positive{color:#15803d}.negative{color:#c2410c}.blue{background:linear-gradient(145deg,rgba(255,255,255,.74),rgba(215,234,255,.72))}.violet{background:linear-gradient(145deg,rgba(255,255,255,.74),rgba(236,224,255,.7))}.balance{display:grid;grid-template-columns:minmax(0,1fr) 220px;align-items:center;gap:18px;margin-bottom:12px;padding:16px}.salary input{min-height:58px;font-size:1.5rem;font-weight:780}.orb{display:grid;place-items:center;min-height:132px;border-radius:999px;text-align:center;color:#fff;background:linear-gradient(145deg,#34c759,#0f7a36);box-shadow:0 20px 44px rgba(18,128,63,.22)}.orb.neg{background:linear-gradient(145deg,#ff7a45,#b93913)}.orb strong{font-size:.82rem;letter-spacing:.1em;text-transform:uppercase}.orb span{font-size:1.55rem;font-weight:850}.grid{display:grid;grid-template-columns:minmax(0,.92fr) minmax(0,1.08fr);gap:12px;align-items:start}.grid .panel:last-child{grid-column:1/-1}.panel-head{display:flex;align-items:center;justify-content:space-between;min-height:58px;padding:0 14px}.panel-head>button:first-child{display:inline-flex;align-items:center;gap:9px;color:#16181d;background:transparent;font-size:1.04rem;font-weight:820}.chev{transition:transform .18s ease}.open .chev{transform:rotate(180deg)}.body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .22s ease}.body>div{min-height:0;overflow:hidden}.open+.body{grid-template-rows:1fr}.form,.list,.people{display:grid;gap:14px;padding:0 14px 14px}.picker{display:grid;gap:10px}.chips,.suggestions,.shares{display:flex;flex-wrap:wrap;gap:8px}.chip,.suggestions button{display:inline-flex;align-items:center;gap:6px;min-height:34px;border-radius:999px;padding:0 11px;color:#0b63ce;background:rgba(0,122,255,.1);transition:transform .16s ease}.chip.lock{color:#156a37;background:rgba(52,199,89,.13)}.inline{display:grid;grid-template-columns:minmax(0,1fr) 48px;gap:8px}.preview,.share,.person{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:46px;border-radius:8px;padding:0 12px;background:rgba(247,249,252,.78)}.primary,.ghost{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:46px;border-radius:999px;padding:0 16px;font-weight:820;transition:transform .16s ease}.primary{color:#fff;background:linear-gradient(145deg,#0a84ff,#0064d2);box-shadow:0 14px 30px rgba(0,100,210,.24)}.ghost{min-height:38px;color:#c2410c;background:rgba(255,255,255,.66)}.bill{display:grid;gap:14px;padding:14px;animation:rise .26s ease both}.billtop{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.bill h2{margin:0 0 4px;font-size:1.06rem}.share{min-width:150px;flex:1}.person strong,.share strong,.preview strong{white-space:nowrap}.empty{margin:0;padding:20px;border-radius:8px;color:rgba(22,24,29,.62);background:rgba(255,255,255,.48)}.footer{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-top:14px}.toast{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));display:inline-flex;align-items:center;gap:8px;min-height:46px;padding:0 16px;transform:translateX(-50%);animation:toast .22s ease both}@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes toast{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}@media(max-width:820px){.hero{align-items:flex-start;flex-direction:column}.summary{grid-template-columns:repeat(2,minmax(0,1fr))}.balance,.grid{grid-template-columns:1fr}.grid .panel:last-child{grid-column:auto}.orb{min-height:116px;border-radius:8px}}@media(max-width:520px){.app{padding-inline:12px}.summary{gap:8px}.card{min-height:104px;padding:12px}.card strong{font-size:1.1rem}.footer{align-items:stretch;flex-direction:column}}
  </style>
</head>
<body>
  <main class="app">
    <section class="wrap hero"><div><span class="eyebrow">Ponte</span><h1>Contas divididas, saldo claro.</h1></div><div class="hero-actions"><button class="icon" id="undo" title="Desfazer">↶</button><button class="icon" id="redo" title="Refazer">↷</button><button class="icon" id="install" title="Instalar">⇩</button></div></section>
    <section class="wrap summary" id="summary"></section>
    <section class="wrap balance"><label class="salary"><span>Quanto voce recebe?</span><input id="salary" inputmode="decimal" placeholder="R$ 0,00"></label><div class="orb" id="orb"><strong>positivo</strong><span>R$ 0,00</span></div></section>
    <div class="wrap grid">
      <section class="panel"><header class="panel-head open"><button data-toggle="new"><span class="chev">⌄</span>Nova conta</button></header><div class="body"><div class="form"><label><span>Nome</span><input id="title" placeholder="Aluguel, luz, internet..."></label><label><span>Valor total</span><input id="amount" inputmode="decimal" placeholder="R$ 0,00"></label><div class="picker"><span class="muted">Dividir com</span><div class="chips" id="chips"></div><form class="inline" id="personForm"><input id="personName" list="known" placeholder="Nome da pessoa"><datalist id="known"></datalist><button aria-label="Adicionar pessoa">+</button></form><div class="suggestions" id="suggestions"></div></div><div class="preview"><span class="muted">Divisao</span><strong id="preview">R$ 0,00 por pessoa</strong></div><button class="primary" id="add">+ adicionar conta</button></div></div></section>
      <section class="panel"><header class="panel-head open"><button data-toggle="bills"><span class="chev">⌄</span>Contas</button><button class="ghost" id="clear">apagar</button></header><div class="body"><div class="list" id="bills"></div></div></section>
      <section class="panel"><header class="panel-head"><button data-toggle="people"><span class="chev">⌄</span>Por pessoa</button></header><div class="body"><div class="people" id="people"></div></div></section>
    </div>
    <footer class="wrap footer"><span class="muted" id="saved">Salvamento automatico ativo</span><button class="ghost" id="reset">zerar tudo</button></footer>
    <div class="toast" id="toast" hidden>Salvo</div>
  </main>
<script>
const KEY='ponte-contas:v1';const LIMIT=80;const money=v=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(Number.isFinite(v)?v:0);const parse=v=>{if(typeof v==='number')return v;return parseFloat(String(v||'').replace(/[^\d,.-]/g,'').replace(/\.(?=\d{3}(,|$))/g,'').replace(',','.'))||0};const norm=v=>{v=String(v||'').trim().replace(/\s+/g,' ');return v?v[0].toUpperCase()+v.slice(1):''};const uniq=a=>{const s=new Set();return a.map(norm).filter(x=>x&&!s.has(x)&&s.add(x))};let state=load(),draft={title:'',amount:'',participants:['Eu']},undo=[],redo=[],toastTimer;function load(){try{return sanitize(JSON.parse(localStorage.getItem(KEY)))}catch{return sanitize({})}}function sanitize(s){return{salary:s?.salary||'',people:uniq(['Eu',...(s?.people||[])]),bills:(s?.bills||[]).map(b=>({...b,amount:parse(b.amount),participants:uniq(b.participants?.length?b.participants:['Eu'])})),updatedAt:s?.updatedAt||null}}function save(msg='Salvo'){state.updatedAt=new Date().toISOString();localStorage.setItem(KEY,JSON.stringify(state));show(msg);render()}function commit(fn,msg){undo=[JSON.parse(JSON.stringify(state)),...undo].slice(0,LIMIT);redo=[];fn();state=sanitize(state);save(msg)}function show(msg){clearTimeout(toastTimer);const el=document.getElementById('toast');el.textContent=msg;el.hidden=false;toastTimer=setTimeout(()=>el.hidden=true,1800)}function totals(){const by=new Map();let gross=0,mine=0;for(const b of state.bills){const ps=uniq(b.participants),share=(+b.amount||0)/Math.max(ps.length,1);gross+=+b.amount||0;for(const p of ps){by.set(p,(by.get(p)||0)+share);if(p==='Eu')mine+=share}}if(!by.has('Eu'))by.set('Eu',0);return{gross,mine,balance:parse(state.salary)-mine,by:[...by].map(([name,total])=>({name,total})).sort((a,b)=>a.name==='Eu'?-1:b.name==='Eu'?1:b.total-a.total)}}function render(){const t=totals();document.getElementById('salary').value=state.salary;document.getElementById('summary').innerHTML=[['Salario',money(parse(state.salary)),''],['Sua parte',money(t.mine),'blue'],['Total sem dividir',money(t.gross),'violet'],['Saldo',money(t.balance),t.balance>=0?'positive':'negative']].map(x=>`<article class="card ${x[2]}"><span class="muted">${x[0]}</span><strong>${x[1]}</strong></article>`).join('');const orb=document.getElementById('orb');orb.className='orb '+(t.balance<0?'neg':'');orb.innerHTML=`<strong>${t.balance>=0?'positivo':'negativo'}</strong><span>${money(Math.abs(t.balance))}</span>`;document.getElementById('undo').disabled=!undo.length;document.getElementById('redo').disabled=!redo.length;document.getElementById('clear').disabled=!state.bills.length;document.getElementById('saved').textContent=state.updatedAt?'Salvo automaticamente '+new Intl.DateTimeFormat('pt-BR',{hour:'2-digit',minute:'2-digit'}).format(new Date(state.updatedAt)):'Salvamento automatico ativo';renderDraft();renderBills();renderPeople(t)}function renderDraft(){const known=state.people.filter(p=>!draft.participants.includes(p));document.getElementById('title').value=draft.title;document.getElementById('amount').value=draft.amount;document.getElementById('chips').innerHTML=draft.participants.map(p=>`<button class="chip ${p==='Eu'?'lock':''}" data-remove="${p}">${p}${p==='Eu'?'':' ×'}</button>`).join('');document.getElementById('known').innerHTML=known.map(p=>`<option value="${p}"></option>`).join('');document.getElementById('suggestions').innerHTML=known.slice(0,5).map(p=>`<button data-addperson="${p}">${p}</button>`).join('');document.getElementById('preview').textContent=money(parse(draft.amount)/Math.max(draft.participants.length,1))+' por pessoa'}function renderBills(){const root=document.getElementById('bills');root.innerHTML=state.bills.length?state.bills.map(b=>{const share=b.amount/b.participants.length;return`<article class="bill"><div class="billtop"><div><h2>${esc(b.title)}</h2><span class="muted">${money(b.amount)} total, ${b.participants.length} pessoa${b.participants.length>1?'s':''}</span></div><button class="icon" data-del="${b.id}">×</button></div><div class="shares">${b.participants.map(p=>`<div class="share"><span>${esc(p)}</span><strong>${money(share)}</strong></div>`).join('')}</div></article>`}).join(''):'<p class="empty">Adicione sua primeira conta para ver as divisoes aparecerem aqui.</p>'}function renderPeople(t){document.getElementById('people').innerHTML=t.by.map(p=>`<div class="person"><span>${esc(p.name)}</span><strong>${money(p.total)}</strong></div>`).join('')}function esc(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}document.getElementById('salary').addEventListener('input',e=>commit(()=>state.salary=e.target.value,'Salario salvo'));document.getElementById('title').addEventListener('input',e=>{draft.title=e.target.value;renderDraft()});document.getElementById('amount').addEventListener('input',e=>{draft.amount=e.target.value;renderDraft()});document.getElementById('personForm').addEventListener('submit',e=>{e.preventDefault();addPerson(document.getElementById('personName').value);document.getElementById('personName').value=''});function addPerson(v){v=norm(v);if(v&&!draft.participants.includes(v)){draft.participants.push(v);renderDraft()}}document.addEventListener('click',e=>{const d=e.target.closest('[data-del]'),r=e.target.closest('[data-remove]'),a=e.target.closest('[data-addperson]'),tog=e.target.closest('[data-toggle]');if(d)commit(()=>state.bills=state.bills.filter(b=>b.id!==d.dataset.del),'Conta removida');if(r&&r.dataset.remove!=='Eu'){draft.participants=draft.participants.filter(p=>p!==r.dataset.remove);renderDraft()}if(a)addPerson(a.dataset.addperson);if(tog){const h=tog.closest('.panel-head');h.classList.toggle('open')}});document.getElementById('add').onclick=()=>{const title=draft.title.trim(),amount=parse(draft.amount);if(!title||amount<=0)return show('Preencha nome e valor');const ps=uniq(draft.participants.length?draft.participants:['Eu']);commit(()=>{state.people=uniq([...state.people,...ps]);state.bills=[{id:crypto.randomUUID(),title,amount,participants:ps,createdAt:new Date().toISOString()},...state.bills]},'Conta adicionada');draft={title:'',amount:'',participants:['Eu']};render()};document.getElementById('clear').onclick=()=>commit(()=>state.bills=[],'Contas apagadas');document.getElementById('reset').onclick=()=>commit(()=>{state={salary:'',people:['Eu'],bills:[],updatedAt:null}},'Tudo zerado');document.getElementById('undo').onclick=()=>{if(!undo.length)return;redo=[JSON.parse(JSON.stringify(state)),...redo].slice(0,LIMIT);state=undo.shift();localStorage.setItem(KEY,JSON.stringify(state));show('Desfeito');render()};document.getElementById('redo').onclick=()=>{if(!redo.length)return;undo=[JSON.parse(JSON.stringify(state)),...undo].slice(0,LIMIT);state=redo.shift();localStorage.setItem(KEY,JSON.stringify(state));show('Refeito');render()};document.getElementById('install').onclick=()=>show('No celular: compartilhar > adicionar a tela inicial');render();
</script>
</body>
</html>
