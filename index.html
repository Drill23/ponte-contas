<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f4f7fb">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<title>Ponte Contas</title>
<style>
:root{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;color:#101217;background:#edf2f8;--glass:rgba(255,255,255,.68);--line:rgba(255,255,255,.86);--blue:#007aff;--green:#20a653;--red:#d45228;--ink:#101217;--muted:rgba(16,18,23,.58)}*{box-sizing:border-box}body{margin:0;min-width:320px}.app{min-height:100vh;padding:max(18px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right)) 30px max(16px,env(safe-area-inset-left));background:radial-gradient(circle at 15% 0%,rgba(56,143,255,.34),transparent 30%),radial-gradient(circle at 90% 8%,rgba(255,149,0,.24),transparent 28%),radial-gradient(circle at 52% 100%,rgba(52,199,89,.13),transparent 34%),linear-gradient(180deg,#fbfdff,#edf2f8 54%,#e8eef6)}.wrap{width:min(1180px,100%);margin:auto}.hero{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:end;gap:22px;margin-bottom:16px}.eyebrow{display:inline-flex;align-items:center;width:max-content;margin-bottom:10px;border:1px solid rgba(255,255,255,.85);border-radius:999px;padding:7px 11px;background:rgba(255,255,255,.56);box-shadow:0 10px 30px rgba(30,55,90,.08);color:rgba(16,18,23,.62);font-size:.72rem;font-weight:850;letter-spacing:.13em;text-transform:uppercase;backdrop-filter:blur(18px)}h1{max-width:13ch;margin:0;font-size:clamp(2.55rem,8vw,6.2rem);line-height:.89;letter-spacing:-.02em}.subtitle{max-width:46rem;margin:14px 0 0;color:var(--muted);font-size:1.02rem;font-weight:650}.hero-actions{display:flex;flex-wrap:wrap;gap:9px;justify-content:flex-end;padding-bottom:8px}.icon,.round{display:inline-grid;place-items:center;width:44px;height:44px;border-radius:999px;color:#0e1118;background:rgba(255,255,255,.72);box-shadow:inset 0 0 0 1px rgba(255,255,255,.9),0 14px 34px rgba(29,44,67,.14);backdrop-filter:blur(22px);transition:transform .16s ease,box-shadow .16s ease}.icon:hover,.round:hover,.primary:hover,.ghost:hover,.chip:hover,.suggestions button:hover{transform:translateY(-1px);box-shadow:0 18px 36px rgba(29,44,67,.16)}button,input,select{font:inherit}button{border:0;cursor:pointer}button:disabled{opacity:.36;cursor:not-allowed}input,select{width:100%;min-height:50px;border:1px solid rgba(74,91,119,.18);border-radius:12px;padding:0 14px;color:var(--ink);background:rgba(255,255,255,.82);outline:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.8)}input:focus,select:focus{border-color:rgba(0,122,255,.72);background:#fff;box-shadow:0 0 0 5px rgba(0,122,255,.13)}label{display:grid;gap:8px}label span,.muted{color:var(--muted);font-size:.79rem;font-weight:780}.summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:12px}.card,.balance,.panel,.bill,.toast,.monthbar{border:1px solid var(--line);border-radius:18px;background:var(--glass);box-shadow:0 24px 70px rgba(45,59,82,.13),inset 0 1px 0 rgba(255,255,255,.82);backdrop-filter:blur(26px) saturate(1.2)}.card{position:relative;min-height:122px;padding:17px;overflow:hidden}.card:after{content:"";position:absolute;right:-30px;bottom:-38px;width:100px;height:100px;border-radius:999px;background:rgba(0,122,255,.11)}.card strong{position:relative;display:block;margin-top:20px;font-size:clamp(1.25rem,2.4vw,1.95rem);line-height:1;letter-spacing:-.01em}.positive{color:#15803d}.negative{color:#c2410c}.blue{background:linear-gradient(145deg,rgba(255,255,255,.78),rgba(210,232,255,.76))}.violet{background:linear-gradient(145deg,rgba(255,255,255,.78),rgba(236,225,255,.75))}.monthbar{display:grid;grid-template-columns:minmax(0,1fr) 210px auto;gap:12px;align-items:end;margin-bottom:12px;padding:14px}.balance{display:grid;grid-template-columns:minmax(0,1fr) 238px;align-items:center;gap:18px;margin-bottom:12px;padding:18px}.salary input{min-height:62px;border-radius:16px;font-size:1.55rem;font-weight:850}.orb{position:relative;display:grid;place-items:center;min-height:142px;border-radius:44px;text-align:center;color:#fff;background:linear-gradient(145deg,#35d06f,#0f7d3d);box-shadow:0 24px 52px rgba(18,128,63,.26);overflow:hidden}.orb:before{content:"";position:absolute;inset:12px;border:1px solid rgba(255,255,255,.24);border-radius:34px}.orb.neg{background:linear-gradient(145deg,#ff8a52,#b93b15)}.orb strong{position:relative;font-size:.82rem;letter-spacing:.12em;text-transform:uppercase}.orb span{position:relative;font-size:1.65rem;font-weight:900}.grid{display:grid;grid-template-columns:minmax(0,.92fr) minmax(0,1.08fr);gap:12px;align-items:start}.panel{overflow:hidden}.span{grid-column:1/-1}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:62px;padding:0 16px;background:linear-gradient(180deg,rgba(255,255,255,.48),rgba(255,255,255,0))}.panel-head>button:first-child{display:inline-flex;align-items:center;gap:9px;color:var(--ink);background:transparent;font-size:1.05rem;font-weight:880}.actions{display:flex;flex-wrap:wrap;gap:8px}.body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .22s ease}.body>div{min-height:0;overflow:hidden}.open+.body{grid-template-rows:1fr}.form,.list,.people,.compare{display:grid;gap:14px;padding:0 16px 16px}.picker{display:grid;gap:10px}.chips,.suggestions,.shares{display:flex;flex-wrap:wrap;gap:8px}.chip,.suggestions button{display:inline-flex;align-items:center;gap:6px;min-height:36px;border-radius:999px;padding:0 12px;color:#075ab8;background:rgba(0,122,255,.11);font-weight:760}.chip.lock{color:#116431;background:rgba(52,199,89,.15)}.inline{display:grid;grid-template-columns:minmax(0,1fr) 50px;gap:8px}.preview,.share,.person,.row,.compare-line{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:50px;border-radius:14px;padding:0 13px;background:rgba(247,249,252,.82);box-shadow:inset 0 0 0 1px rgba(255,255,255,.72)}.primary,.ghost{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:48px;border-radius:999px;padding:0 17px;font-weight:860;transition:transform .16s ease}.primary{color:#fff;background:linear-gradient(145deg,#0a84ff,#005ecb);box-shadow:0 18px 36px rgba(0,100,210,.26)}.ghost{min-height:38px;color:#bf4321;background:rgba(255,255,255,.62)}.ghost.blue-text{color:#075ab8}.bill{display:grid;gap:14px;padding:15px;animation:rise .26s ease both}.billtop{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.bill h2{margin:0 0 4px;font-size:1.08rem}.share{min-width:150px;flex:1}.share strong,.person strong,.preview strong,.row strong,.compare-line strong{white-space:nowrap}.empty{margin:0;padding:22px;border-radius:14px;color:rgba(16,18,23,.62);background:rgba(255,255,255,.48)}.compare-controls{display:grid;grid-template-columns:1fr 1fr;gap:10px}.table{display:grid;gap:8px}.delta-up{color:#c2410c}.delta-down{color:#15803d}.delta-flat{color:var(--muted)}.footer{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-top:14px}.toast{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));display:inline-flex;align-items:center;min-height:46px;padding:0 16px;transform:translateX(-50%);font-weight:820}.toast[hidden],.hidden{display:none!important}@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@media(max-width:880px){.hero{grid-template-columns:1fr}.summary{grid-template-columns:repeat(2,minmax(0,1fr))}.balance,.grid,.monthbar{grid-template-columns:1fr}.span{grid-column:auto}.orb{min-height:118px;border-radius:22px}.hero-actions{justify-content:flex-start}}@media(max-width:540px){.app{padding-inline:12px}.summary{gap:8px}.card{min-height:108px;padding:13px;border-radius:16px}.card strong{font-size:1.12rem}.compare-controls{grid-template-columns:1fr}.footer{align-items:stretch;flex-direction:column}}
</style>
</head>
<body>
<main class="app">
<section class="wrap hero"><div><span class="eyebrow">Ponte</span><h1>Contas divididas, saldo claro.</h1><p class="subtitle">Agora com fechamento mensal, memoria de contas e comparacao entre meses para voce enxergar onde economizou.</p></div><div class="hero-actions"><button class="icon" id="undo" title="Desfazer">↶</button><button class="icon" id="redo" title="Refazer">↷</button><button class="icon" id="install" title="Instalar">⇩</button><button class="icon" id="export" title="Exportar backup">⇪</button><input class="hidden" id="importFile" type="file" accept="application/json"><button class="icon" id="import" title="Importar backup">↥</button></div></section>
<section class="wrap monthbar"><div><span class="muted">Mes em edicao</span><h2 id="monthTitle" style="margin:4px 0 0;font-size:1.55rem"></h2></div><label><span>Selecionar mes</span><input id="month" type="month"></label><button class="primary" id="archive">Salvar mes</button></section>
<section class="wrap summary" id="summary"></section>
<section class="wrap balance"><label class="salary"><span>Quanto voce recebe?</span><input id="salary" inputmode="decimal" placeholder="R$ 0,00"></label><div class="orb" id="orb"><strong>positivo</strong><span>R$ 0,00</span></div></section>
<div class="wrap grid">
<section class="panel"><header class="panel-head open"><button data-toggle><span>⌄</span>Nova conta</button></header><div class="body"><div class="form"><label><span>Nome</span><input id="title" list="billNames" placeholder="Aluguel, luz, pet shop..."><datalist id="billNames"></datalist></label><label><span>Valor total</span><input id="amount" inputmode="decimal" placeholder="R$ 0,00"></label><div class="picker"><span class="muted">Dividir com</span><div class="chips" id="chips"></div><form class="inline" id="personForm"><input id="personName" list="known" placeholder="Nome da pessoa"><datalist id="known"></datalist><button aria-label="Adicionar pessoa">+</button></form><div class="suggestions" id="suggestions"></div></div><div class="preview"><span class="muted">Divisao</span><strong id="preview">R$ 0,00 por pessoa</strong></div><button class="primary" id="add">+ adicionar conta</button></div></div></section>
<section class="panel"><header class="panel-head open"><button data-toggle><span>⌄</span>Contas do mes</button><div class="actions"><button class="ghost blue-text" id="archive2">salvar</button><button class="ghost" id="clear">limpar</button></div></header><div class="body"><div class="list" id="bills"></div></div></section>
<section class="panel span"><header class="panel-head open"><button data-toggle><span>⌄</span>Historico e comparacao</button></header><div class="body"><div class="compare"><div class="compare-controls"><label><span>Mes base</span><select id="monthA"></select></label><label><span>Comparar com</span><select id="monthB"></select></label></div><div id="compareSummary" class="table"></div><div id="compareRows" class="table"></div></div></div></section>
<section class="panel span"><header class="panel-head"><button data-toggle><span>⌄</span>Por pessoa neste mes</button></header><div class="body"><div class="people" id="people"></div></div></section>
</div>
<footer class="wrap footer"><span class="muted" id="saved">Salvamento automatico ativo</span><button class="ghost" id="reset">zerar tudo</button></footer><div class="toast" id="toast" hidden>Salvo</div>
</main>
<script>
const KEY='ponte-contas:v2',OLD='ponte-contas:v1',LIMIT=80;
const money=v=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(Number.isFinite(v)?v:0);
const parse=v=>{if(typeof v==='number')return v;return parseFloat(String(v||'').replace(/[^\d,.-]/g,'').replace(/\.(?=\d{3}(,|$))/g,'').replace(',','.'))||0};
const norm=v=>{v=String(v||'').trim().replace(/\s+/g,' ');return v?v[0].toUpperCase()+v.slice(1):''};
const keyName=s=>norm(s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
const uniq=a=>{const seen=new Set;return a.map(norm).filter(x=>x&&!seen.has(keyName(x))&&seen.add(keyName(x)))};
const $=id=>document.getElementById(id);
let state=load(),draft={title:'',amount:'',participants:['Eu']},undo=[],redo=[],timer;
function currentMonth(){const d=new Date;return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}
function nextMonth(m){const [y,mo]=m.split('-').map(Number),d=new Date(y,mo,1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}
function monthLabel(m){if(!m)return 'Mes atual';const [y,mo]=m.split('-').map(Number);return new Intl.DateTimeFormat('pt-BR',{month:'long',year:'numeric'}).format(new Date(y,mo-1,1))}
function load(){try{const v=JSON.parse(localStorage.getItem(KEY));if(v)return sanitize(v)}catch{}try{const old=JSON.parse(localStorage.getItem(OLD));if(old)return sanitize({salary:old.salary,people:old.people,bills:old.bills,month:currentMonth(),billNames:(old.bills||[]).map(b=>b.title),archives:{}})}catch{}return sanitize({})}
function sanitize(s){return{salary:s?.salary||'',month:s?.month||currentMonth(),people:uniq(['Eu',...(s?.people||[])]),billNames:uniq(s?.billNames||[]),bills:(s?.bills||[]).map(cleanBill),archives:Object.fromEntries(Object.entries(s?.archives||{}).map(([m,a])=>[m,sanitizeArchive(m,a)])),updatedAt:s?.updatedAt||null}}
function cleanBill(b){return{id:b.id||crypto.randomUUID(),title:norm(b.title)||'Conta',amount:parse(b.amount),participants:uniq(b.participants?.length?b.participants:['Eu']),createdAt:b.createdAt||new Date().toISOString()}}
function sanitizeArchive(month,a){return{month,salary:a?.salary||'',people:uniq(['Eu',...(a?.people||[])]),billNames:uniq(a?.billNames||[]),bills:(a?.bills||[]).map(cleanBill),savedAt:a?.savedAt||new Date().toISOString()}}
function snapshot(){return sanitizeArchive(state.month,{salary:state.salary,people:state.people,billNames:knownTitles(),bills:state.bills,savedAt:new Date().toISOString()})}
function persist(){state.updatedAt=new Date().toISOString();localStorage.setItem(KEY,JSON.stringify(state))}
function commit(fn,msg){undo=[JSON.parse(JSON.stringify(state)),...undo].slice(0,LIMIT);redo=[];fn();state=sanitize(state);persist();show(msg||'Salvo');render()}
function show(msg){clearTimeout(timer);const el=$('toast');el.textContent=msg;el.hidden=false;timer=setTimeout(()=>el.hidden=true,1800)}
function totals(src=state){const by=new Map;let gross=0,mine=0;for(const b of src.bills||[]){const ps=uniq(b.participants),share=(+b.amount||0)/Math.max(ps.length,1);gross+=+b.amount||0;for(const p of ps){by.set(p,(by.get(p)||0)+share);if(p==='Eu')mine+=share}}if(!by.has('Eu'))by.set('Eu',0);return{gross,mine,balance:parse(src.salary)-mine,by:[...by].map(([name,total])=>({name,total})).sort((a,b)=>a.name==='Eu'?-1:b.name==='Eu'?1:b.total-a.total)}}
function knownTitles(){return uniq([...state.billNames,...state.bills.map(b=>b.title),...Object.values(state.archives).flatMap(a=>a.bills.map(b=>b.title))])}
function archiveMonth(silent=false){if(!state.bills.length&&!parse(state.salary)){if(!silent)show('Nada para salvar neste mes');return false}state.archives[state.month]=snapshot();state.billNames=uniq([...state.billNames,...state.bills.map(b=>b.title)]);state.people=uniq([...state.people,...state.bills.flatMap(b=>b.participants)]);persist();if(!silent)show(`${monthLabel(state.month)} salvo`);return true}
function render(){const t=totals();$('month').value=state.month;$('monthTitle').textContent=monthLabel(state.month);$('salary').value=state.salary;$('summary').innerHTML=[['Salario',money(parse(state.salary)),''],['Sua parte',money(t.mine),'blue'],['Total sem dividir',money(t.gross),'violet'],['Saldo',money(t.balance),t.balance>=0?'positive':'negative']].map(x=>`<article class="card ${x[2]}"><span class="muted">${x[0]}</span><strong>${x[1]}</strong></article>`).join('');$('orb').className='orb '+(t.balance<0?'neg':'');$('orb').innerHTML=`<strong>${t.balance>=0?'positivo':'negativo'}</strong><span>${money(Math.abs(t.balance))}</span>`;$('undo').disabled=!undo.length;$('redo').disabled=!redo.length;$('clear').disabled=!state.bills.length;renderDraft();renderBills();renderPeople(t);renderCompare();$('saved').textContent=state.updatedAt?'Salvo automaticamente '+new Intl.DateTimeFormat('pt-BR',{hour:'2-digit',minute:'2-digit'}).format(new Date(state.updatedAt)):'Salvamento automatico ativo'}
function renderDraft(){const people=state.people.filter(p=>!draft.participants.includes(p));$('title').value=draft.title;$('amount').value=draft.amount;$('chips').innerHTML=draft.participants.map(p=>`<button class="chip ${p==='Eu'?'lock':''}" data-remove="${esc(p)}">${esc(p)}${p==='Eu'?'':' ×'}</button>`).join('');$('known').innerHTML=people.map(p=>`<option value="${esc(p)}"></option>`).join('');$('suggestions').innerHTML=people.slice(0,5).map(p=>`<button data-addperson="${esc(p)}">${esc(p)}</button>`).join('');$('billNames').innerHTML=knownTitles().map(t=>`<option value="${esc(t)}"></option>`).join('');$('preview').textContent=money(parse(draft.amount)/Math.max(draft.participants.length,1))+' por pessoa'}
function renderBills(){$('bills').innerHTML=state.bills.length?state.bills.map(b=>{const share=b.amount/b.participants.length;return`<article class="bill"><div class="billtop"><div><h2>${esc(b.title)}</h2><span class="muted">${money(b.amount)} total, ${b.participants.length} pessoa${b.participants.length>1?'s':''}</span></div><button class="icon" data-del="${b.id}">×</button></div><div class="shares">${b.participants.map(p=>`<div class="share"><span>${esc(p)}</span><strong>${money(share)}</strong></div>`).join('')}</div></article>`}).join(''):`<p class="empty">Adicione as contas de ${monthLabel(state.month)}. Ao limpar, o app pode arquivar este mes para comparacoes futuras.</p>`}
function renderPeople(t){$('people').innerHTML=t.by.map(p=>`<div class="person"><span>${esc(p.name)}</span><strong>${money(p.total)}</strong></div>`).join('')}
function compareOptions(){const months=Object.keys(state.archives).sort().reverse();return ['current',...months.filter(m=>m!==state.month)]}
function sourceFor(k){return k==='current'?{...state,month:state.month}:state.archives[k]}
function renderCompare(){const opts=compareOptions();const html=opts.map(k=>`<option value="${k}">${k==='current'?'Mes em edicao: ':''}${monthLabel(k==='current'?state.month:k)}</option>`).join('');if($('monthA').dataset.options!==html){$('monthA').innerHTML=html;$('monthB').innerHTML=html;$('monthA').dataset.options=html;if(opts[1])$('monthA').value=opts[1];$('monthB').value='current'}const a=sourceFor($('monthA').value),b=sourceFor($('monthB').value);if(!a||!b){$('compareSummary').innerHTML='<p class="empty">Salve pelo menos um mes para comparar.</p>';$('compareRows').innerHTML='';return}const ta=totals(a),tb=totals(b);$('compareSummary').innerHTML=[line('Total sem dividir',ta.gross,tb.gross),line('Sua parte',ta.mine,tb.mine),line('Saldo final',ta.balance,tb.balance)].join('');$('compareRows').innerHTML=compareBills(a,b).map(r=>line(r.title,r.a,r.b)).join('')||'<p class="empty">Nenhuma conta para comparar nesses meses.</p>'}
function line(label,a,b){const d=b-a,cls=d>0?'delta-up':d<0?'delta-down':'delta-flat',sign=d>0?'+':'';return`<div class="compare-line"><span>${esc(label)}</span><strong>${money(a)} → ${money(b)} <span class="${cls}">(${sign}${money(d)})</span></strong></div>`}
function compareBills(a,b){const map=new Map;for(const src of [['a',a],['b',b]])for(const bill of src[1].bills||[]){const k=keyName(bill.title),cur=map.get(k)||{title:bill.title,a:0,b:0};cur[src[0]]+=(bill.participants||[]).includes('Eu')?bill.amount/Math.max(bill.participants.length,1):0;map.set(k,cur)}return[...map.values()].sort((x,y)=>Math.abs(y.b-y.a)-Math.abs(x.b-x.a))}
function addPerson(v){v=norm(v);if(v&&!draft.participants.includes(v)){draft.participants.push(v);renderDraft()}}
function clearMonth(){if(!state.bills.length)return;const saveFirst=confirm(`Salvar ${monthLabel(state.month)} no historico antes de limpar?`);if(saveFirst)archiveMonth(true);else if(!confirm('Limpar sem salvar este mes?'))return;commit(()=>{state.bills=[];state.month=nextMonth(state.month)},'Novo mes pronto')}
function esc(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
$('salary').oninput=e=>commit(()=>state.salary=e.target.value,'Salario salvo');$('month').onchange=e=>commit(()=>state.month=e.target.value||currentMonth(),'Mes alterado');$('title').oninput=e=>{draft.title=e.target.value;renderDraft()};$('amount').oninput=e=>{draft.amount=e.target.value;renderDraft()};$('personForm').onsubmit=e=>{e.preventDefault();addPerson($('personName').value);$('personName').value=''};$('add').onclick=()=>{const title=norm(draft.title),amount=parse(draft.amount);if(!title||amount<=0)return show('Preencha nome e valor');const ps=uniq(draft.participants.length?draft.participants:['Eu']);commit(()=>{state.people=uniq([...state.people,...ps]);state.billNames=uniq([...state.billNames,title]);state.bills=[{id:crypto.randomUUID(),title,amount,participants:ps,createdAt:new Date().toISOString()},...state.bills]},'Conta adicionada');draft={title:'',amount:'',participants:['Eu']};render()};$('archive').onclick=()=>commit(()=>archiveMonth(true),'Mes salvo');$('archive2').onclick=$('archive').onclick;$('clear').onclick=clearMonth;$('reset').onclick=()=>{if(confirm('Isto apaga contas, historico e comparacoes salvas neste navegador. Continuar?'))commit(()=>{state=sanitize({})},'Tudo zerado')};$('undo').onclick=()=>{if(!undo.length)return;redo=[JSON.parse(JSON.stringify(state)),...redo].slice(0,LIMIT);state=undo.shift();persist();show('Desfeito');render()};$('redo').onclick=()=>{if(!redo.length)return;undo=[JSON.parse(JSON.stringify(state)),...undo].slice(0,LIMIT);state=redo.shift();persist();show('Refeito');render()};$('install').onclick=()=>show('No celular: compartilhar > adicionar a tela inicial');$('export').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='ponte-contas-backup.json';a.click();URL.revokeObjectURL(a.href)};$('import').onclick=()=>$('importFile').click();$('importFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader;r.onload=()=>{try{commit(()=>{state=sanitize(JSON.parse(r.result))},'Backup importado')}catch{show('Backup invalido')}};r.readAsText(f)};$('monthA').onchange=renderCompare;$('monthB').onchange=renderCompare;document.onclick=e=>{const d=e.target.closest('[data-del]'),r=e.target.closest('[data-remove]'),a=e.target.closest('[data-addperson]'),tog=e.target.closest('[data-toggle]');if(d)commit(()=>state.bills=state.bills.filter(b=>b.id!==d.dataset.del),'Conta removida');if(r&&r.dataset.remove!=='Eu'){draft.participants=draft.participants.filter(p=>p!==r.dataset.remove);renderDraft()}if(a)addPerson(a.dataset.addperson);if(tog)tog.closest('.panel-head').classList.toggle('open')};
render();
</script>
</body></html>
